  amcl:
    ros__parameters:
      use_sim_time: False #False
      alpha1: 0.2
      alpha2: 0.2
      alpha3: 0.2
      alpha4: 0.2
      alpha5: 0.2
      base_frame_id: "base_link"
      beam_skip_distance: 0.5
      beam_skip_error_threshold: 0.9
      beam_skip_threshold: 0.3
      do_beamskip: false
      global_frame_id: "map"
      lambda_short: 0.1
      laser_likelihood_max_dist: 2.0
      laser_max_range: 100.0
      laser_min_range: -1.0
      laser_model_type: "likelihood_field"
      max_beams: 60
      max_particles: 2000
      min_particles: 500
      odom_frame_id: "odom"
      pf_err: 0.05
      pf_z: 0.99
      recovery_alpha_fast: 0.0
      recovery_alpha_slow: 0.0
      resample_interval: 1
      robot_model_type: "nav2_amcl::OmniMotionModel"
      save_pose_rate: 0.5
      sigma_hit: 0.2
      tf_broadcast: true
      transform_tolerance: 0.3
      update_min_a: 0.2
      update_min_d: 0.25
      z_hit: 0.5
      z_max: 0.05
      z_rand: 0.5
      z_short: 0.05
      scan_topic: /scan

  amcl_map_client:
    ros__parameters:
      use_sim_time: True #False

  amcl_rclcpp_node:
    ros__parameters:
      use_sim_time: True #False

  bt_navigator:
    ros__parameters:
      use_sim_time: True #False
      global_frame: map
      robot_base_frame: base_link
      odom_topic: /genz/odometry
      bt_loop_duration: 10
      default_server_timeout: 20
      plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

  controller_server:
    ros__parameters:
      use_sim_time: True 
      controller_frequency: 20.0
      min_x_velocity_threshold: 0.001
      min_y_velocity_threshold: 0.1
      min_theta_velocity_threshold: 0.001
      failure_tolerance: 0.3
      progress_checker_plugin: "progress_checker"
      goal_checker_plugins: ["general_goal_checker"]
      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0
      general_goal_checker:
        stateful: True
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 0.25
        yaw_goal_tolerance: 6.28
      
      controller_plugins: ["FollowPath"]

      FollowPath:
        plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

        desired_linear_vel: 1.0

        # Lookahead (stable straight motion)
        lookahead_dist: 2.0
        min_lookahead_dist: 1.5
        max_lookahead_dist: 1.8
        use_velocity_scaled_lookahead_dist: False
        max_angular_vel: 0.1
        use_rotate_to_heading: False
        rotate_to_heading_angular_vel: 0.2  
        max_linear_vel: 0.5
        min_linear_vel: -0.5
        #max_angular_vel: 2.5
        min_angular_vel: -0.1
        max_linear_accel: 2.5
        max_linear_decel: -2.5
        max_angular_accel: 3.2
        max_angular_decel: -3.2
        allow_reversing: True

        use_regulated_linear_velocity_scaling: True
        regulated_linear_scaling_min_radius: 0.2
        use_cost_regulated_linear_velocity_scaling: False
        use_collision_detection: False

        min_approach_linear_velocity: 0.2
        approach_velocity_scaling_dist: 0.2

        transform_tolerance: 0.3
  local_costmap:
    local_costmap:
      ros__parameters:
        update_frequency: 20.0
        publish_frequency: 10.0
        global_frame: map
        robot_base_frame: base_link
        use_sim_time: True #False
        rolling_window: true
        width: 5
        height: 5
        resolution: 0.02
        robot_radius: 0.2
        plugins: ["obstacle_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: true
          observation_sources: scan
          scan:
            topic: /scan
            raytrace_max_range: 6.0
            obstacle_max_range: 6.0
            obstacle_min_range: 0.1
            max_obstacle_height: 2.0
            clearing: true
            marking: true
            inf_is_valid: true
            data_type: "LaserScan"
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 5.0
          inflation_radius: 0.6
        always_send_full_costmap: true

  global_costmap:
    global_costmap:
      ros__parameters:
        update_frequency: 2.3 #5.0
        publish_frequency: 2.0
        global_frame: map
        robot_base_frame: base_link
        use_sim_time: True #False
        robot_radius: 0.2
        resolution: 0.04
        track_unknown_space: true
        plugins: ["static_layer", "stvl_layer", "inflation_layer"]
        stvl_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"

          enabled:                  true
          voxel_decay:              2.5 #0.5
          decay_model:              0
          voxel_size:               0.05
          track_unknown_space:      true
          mark_threshold:           0
          update_footprint_enabled: true
          combination_method:       1
          origin_z:                 0.0
          publish_voxel_map:        true
          transform_tolerance:      0.3
          mapping_mode:             false
          map_save_duration:        60.0
          observation_sources:      livox_mark livox_clear
          livox_mark:
            data_type: PointCloud2
            topic: /bf_lidar/point_cloud_out #/segmentation/obstacle
            marking: true
            clearing: false
            obstacle_range: 3.0
            min_obstacle_height: -0.2
            max_obstacle_height: 2.0
            expected_update_rate: 0.0
            observation_persistence: 0.0
            inf_is_valid: false
            filter: "voxel"
            voxel_min_points: 0
            clear_after_reading: true
          livox_clear:
            enabled: true
            data_type: PointCloud2
            topic: /bf_lidar/point_cloud_out #/segmentation/obstacle
            marking: false
            clearing: true
            max_z: 8.0
            min_z: 1.0
            vertical_fov_angle: 1.029
            vertical_fov_padding: 0.05
            horizontal_fov_angle: 6.29
            decay_acceleration: 5.0
            model_type: 1
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          footprint_clearing_enabled: True
          map_subscribe_transient_local: True
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 3.0 #8.0
          inflation_radius: 0.5 #0.7
        always_send_full_costmap: True

  map_saver:
    ros__parameters:
      use_sim_time: True #False
      save_map_timeout: 5.0
      free_thresh_default: 0.25
      occupied_thresh_default: 0.65
      map_subscribe_transient_local: True

  planner_server:
    ros__parameters:
      expected_planner_frequency: 5.0
      use_sim_time: True #False
      planner_plugins: ["GridBased"]
      GridBased:
        plugin: "nav2_navfn_planner/NavfnPlanner"
        tolerance: 0.5
        use_astar: false
        allow_unknown: true

  recoveries_server:
    ros__parameters:
      costmap_topic: local_costmap/costmap_raw
      footprint_topic: local_costmap/published_footprint
      cycle_frequency: 2.0
      recovery_plugins: ["spin", "backup"]
      spin:
        plugin: "nav2_recoveries/Spin"
      backup:
        plugin: "nav2_recoveries/BackUp"
      global_frame: odom
      robot_base_frame: base_link
      transform_timeout: 0.1
      use_sim_time: True #False
      simulate_ahead_time: 1.0
      max_rotational_vel: 3.0
      min_rotational_vel: 0.4
      rotational_acc_lim: 3.0

  map_server:
    ros__parameters:
      use_sim_time: True #False
      yaml_filename: ""

    velocity_smoother:
      ros__parameters:
        smoothing_frequency: 20.0
        scale_velocities: False
        feedback: "CLOSED_LOOP"
        max_velocity: [0.8, 0.8, 0.8]
        min_velocity: [-0.8, -0.8, -0.8]
        deadband_velocity: [0.0, 0.0, 0.0]
        velocity_timeout: 1.0
        max_accel: [4.0, 4.0, 6.0]
        max_decel: [-4.0, -4.0, -6.0]
        odom_topic: /genz/odometry
        odom_duration: 0.1

  # velocity_smoother:
